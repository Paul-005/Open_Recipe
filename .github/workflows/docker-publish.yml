name: Docker Build and Publish

on:
  push:
    branches:
      - main
      - dockerise
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            paulbabu05/open-recipe-v2:latest
            paulbabu05/open-recipe-v2:${{ github.sha }}
          cache-from: type=registry,ref=paulbabu05/open-recipe-v2:buildcache
          cache-to: type=registry,ref=paulbabu05/open-recipe-v2:buildcache,mode=max
